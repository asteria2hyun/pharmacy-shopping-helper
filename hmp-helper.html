<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HMP 최저구매 계산기</title>
<link rel="stylesheet" href="./styles.css">
<style>
  /* 확장프로그램 전용 UI 오버라이드 */
  .product .quoteTools,
  .product .pasteBox,
  .product .tableWrap,
  .product .productFields label:first-child {
    display: none !important;
  }

  .product {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }

  .productHead {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .productFields {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    flex-wrap: wrap;
  }

  .productFields label:nth-child(2) {
    flex: 1;
    min-width: 160px;
  }
  .productFields label:nth-child(2) input {
    width: 100%;
    font-size: 14px;
    font-weight: 600;
  }

  .productFields .qtyField {
    width: 80px;
    flex-shrink: 0;
  }
  .productFields .qtyField input {
    width: 100%;
    text-align: center;
    font-size: 16px;
    font-weight: 700;
  }

  .couponPanel { display: none !important; }
  .topbar p { display: none; }

  /* 상품 체크박스 */
  .productEnabledCb {
    width: 18px; height: 18px;
    flex-shrink: 0;
    cursor: pointer;
    accent-color: #1a56db;
  }
  .product.disabled { opacity: 0.45; }
  .product.disabled .nameInput,
  .product.disabled .qtyInput { color: #9ca3af; }

  /* 업체 미리보기 */
  .productVendorPreview {
    margin-top: 6px;
    padding: 6px 10px;
    background: #f8faff;
    border-radius: 6px;
    border: 1px solid #e0e7ff;
    font-size: 11px;
    color: #374151;
    line-height: 1.6;
  }
  .productVendorPreview .vendor-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .productVendorPreview .vendor-name { color: #1a56db; font-weight: 600; }
  .productVendorPreview .vendor-price { color: #111; }
  .productVendorPreview .vendor-best {
    background: #1a56db;
    color: white;
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 3px;
    margin-left: 3px;
  }

  /* 자동담기 버튼 숨김 (app.js 참조용 DOM은 유지) */
  .autoCartBox { display: none !important; }

  /* 빈 상태 안내 */
  #products:empty::after {
    content: '확장프로그램에서 HMP몰 상품을 캡처하면 여기에 추가됩니다.';
    display: block;
    padding: 32px 16px;
    text-align: center;
    color: #9ca3af;
    font-size: 13px;
    background: #f9fafb;
    border-radius: 10px;
    border: 1px dashed #e5e7eb;
  }
</style>
</head>
<body>
<header class="topbar">
  <div>
    <h1>HMP 최저구매 계산기</h1>
  </div>
  <button id="addProductBtn" class="primary" style="display:none">상품 추가</button>
</header>

<main class="layout">
  <section class="workspace">

    <!-- 확장프로그램 통신용 (숨김) -->
    <div style="display:none">
      <input id="defaultMinOrder" type="number" value="50000">
      <textarea id="hmpCaptureInput"></textarea>
      <button id="importHmpBtn">가격표 추가</button>
      <button id="pasteClipboardBtn">붙여넣기</button>
      <span id="importHint"></span>
    </div>

    <!-- 쿠폰 (숨김 - 확장프로그램에서 추가) -->
    <div style="display:none">
      <button id="addCouponBtn">쿠폰 추가</button>
      <table><tbody id="couponRows"></tbody></table>
    </div>

    <div class="sectionTitle">
      <h2>📦 주문 상품 목록</h2>
      <div class="titleActions">
        <button id="runTestBtn"    class="secondary" style="display:none">테스트</button>
        <button id="loadSampleBtn" class="ghost"     style="display:none">예시</button>
        <button id="saveStateBtn"  class="ghost" title="현재 목록 저장">💾 저장</button>
        <button id="clearBtn" class="ghost">초기화</button>
      </div>
    </div>

    <div id="testResult" class="testResult hidden"></div>
    <div id="products" class="products"></div>

  </section>

  <aside class="resultPanel">
    <div class="resultHeader">
      <h2>추천 결과</h2>
      <span id="statusBadge" class="badge">대기</span>
    </div>
    <div class="metricGrid">
      <div><span>추천 총액</span><strong id="bestTotal">-</strong></div>
      <div><span>상품 수</span><strong id="itemCount">0</strong></div>
    </div>
    <h3>구매 목록</h3>
    <div id="bestPlan" class="empty">확장프로그램에서 상품을 캡처하면 결과가 표시됩니다.</div>
    <h3>업체별 합계</h3>
    <div id="vendorSummary" class="empty">아직 계산할 내용이 없습니다.</div>
    <h3>검토할 대안</h3>
    <div id="alternatives" class="empty">추천 조합이 생기면 함께 표시됩니다.</div>
    <div class="suggestionHeader">
      <h3>구매 제안</h3>
      <button id="undoSuggestionBtn" class="ghost smallButton">원상태로</button>
    </div>
    <div id="suggestions" class="empty">쿠폰 조건이나 더 싼 업체가 보이면 제안합니다.</div>
    <div class="autoCartBox">
      <button id="copyAutoCartBtn" class="primary">자동담기 데이터 복사</button>
      <button id="openHmpBtn" class="linkButton compactLink" type="button">HMP 열기</button>
      <div id="autoCartStatus" class="autoCartStatus"></div>
    </div>
  </aside>
</main>

<!-- 상품 템플릿 -->
<template id="productTemplate">
  <article class="product">
    <div class="productHead">
      <input type="checkbox" class="productEnabledCb" checked title="구매 목록에 포함">
      <div class="productFields">
        <label style="display:none">
          검색어<input class="searchInput" type="text">
        </label>
        <label>
          <input class="nameInput" type="text" placeholder="상품명">
        </label>
        <label class="qtyField">
          수량<input class="qtyInput" type="number" min="1" step="1" value="1">
        </label>
      </div>
      <button class="removeProduct iconBtn" title="상품 삭제">×</button>
    </div>
    <div class="quoteTools" style="display:none">
      <button class="addQuoteBtn secondary">업체 가격 추가</button>
      <button class="pasteToggleBtn ghost">여러 줄 붙여넣기</button>
    </div>
    <div class="pasteBox hidden" style="display:none">
      <textarea class="pasteInput" rows="4"></textarea>
      <button class="pasteApplyBtn secondary">가격표 반영</button>
    </div>
    <div class="tableWrap" style="display:none">
      <table>
        <thead>
          <tr><th>업체명</th><th>단가</th><th>최저주문금액</th><th>재고</th><th>사용</th><th></th></tr>
        </thead>
        <tbody class="quoteRows"></tbody>
      </table>
    </div>
  </article>
</template>

<template id="quoteTemplate">
  <tr>
    <td><input class="vendorInput" type="text" placeholder="업체명"></td>
    <td><input class="priceInput" type="number" min="0" step="1" placeholder="1900"></td>
    <td><input class="minInput" type="number" min="0" step="1000" placeholder="50000"></td>
    <td><input class="stockInput" type="number" min="0" step="1" placeholder="재고"></td>
    <td><input class="enabledInput" type="checkbox" checked></td>
    <td><button class="removeQuote iconBtn" title="가격 삭제">×</button></td>
  </tr>
</template>

<template id="couponTemplate">
  <tr>
    <td><input class="couponVendorInput" type="text" placeholder="예: 대지인팜"></td>
    <td><input class="couponAmountInput" type="number" min="0" step="1000" placeholder="5000"></td>
    <td><input class="couponMinInput" type="number" min="0" step="1000" placeholder="80000"></td>
    <td><input class="couponQtyInput" type="number" min="1" step="1" value="1"></td>
    <td><input class="couponEnabledInput" type="checkbox" checked></td>
    <td><button class="removeCoupon iconBtn" title="쿠폰 삭제">×</button></td>
  </tr>
</template>

<script>
  // 저장 플래그 없음 - hmp-helper-state-v1은 항상 유지
</script>
<script src="./app.js"></script>
<script src="./calculator.js"></script>
<script>
  // ── HMP 열기 ───────────────────────────────────────────────
  document.getElementById('openHmpBtn').addEventListener('click', () => {
    if (typeof chrome !== 'undefined' && chrome.tabs) {
      chrome.tabs.query({}, tabs => {
        const hmpTab = tabs.find(t => t.url?.includes('hmpmall.co.kr'));
        if (hmpTab) chrome.tabs.update(hmpTab.id, { active: true });
        else chrome.tabs.create({ url: 'https://hmpmall.co.kr' });
      });
    } else {
      window.open('https://hmpmall.co.kr', '_blank');
    }
  });

  // ── 빈 상품 제거 ───────────────────────────────────────────
  var __hmpProductsEl = document.getElementById('products');

  function isBlankProduct(card) {
    const name = card.querySelector('.nameInput')?.value || '';
    const quotes = [...card.querySelectorAll('.quoteRows tr')].filter(row =>
      (row.querySelector('.vendorInput')?.value || '').trim() ||
      (row.querySelector('.priceInput')?.value || '').trim()
    );
    return !name.trim() && quotes.length === 0;
  }

  function removeEmptyProducts() {
    var removed = false;
    __hmpProductsEl.querySelectorAll('.product').forEach(function(card) {
      if (isBlankProduct(card)) { card.remove(); removed = true; }
    });
    return removed;
  }

  var __hmpObserver = new MutationObserver(function() {
    if (removeEmptyProducts() && typeof __debouncedCalculate === 'function') __debouncedCalculate();
  });
  __hmpObserver.observe(__hmpProductsEl, { childList: true });

  removeEmptyProducts();
  setTimeout(removeEmptyProducts, 50);
  setTimeout(removeEmptyProducts, 200);
  setTimeout(removeEmptyProducts, 600);

  // calculator.js에서 호출용
  window.__hmpRemoveEmpty = removeEmptyProducts;
  window.__hmpCalculate = function() {
    removeEmptyProducts();
    if (typeof __debouncedCalculate === 'function') __debouncedCalculate();
  };

  // ── calculate debounce 600ms ────────────────────────────────
  // app.js의 calculate()를 debounce 래핑
  // 수량/체크박스 빠른 변경 시 마지막 입력 후 600ms 뒤 한 번만 실행
  var __calcTimer = null;
  var __origCalculate = null;
  window.__debouncedCalculate = function() {
    clearTimeout(__calcTimer);
    __calcTimer = setTimeout(function() {
      if (typeof __origCalculate === 'function') __origCalculate();
    }, 600);
  };

  function installDebounce() {
    if (typeof calculate !== 'function') return;
    if (__origCalculate) return;
    __origCalculate = calculate;
    window.calculate = window.__debouncedCalculate;
  }
  setTimeout(installDebounce, 0);
  setTimeout(installDebounce, 200);

  // ── 자동저장 ───────────────────────────────────────────────
  // 상품/수량/체크박스/쿠폰 변경 시 자동 저장
  // 초기화 버튼 클릭 시에만 삭제
  var HMP_STATE_KEY = 'hmp-helper-state-v1';
  var __saveTimer = null;

  function readFullState() {
    var products = [...document.querySelectorAll('#products .product')].map(function(p, i) {
      return {
        name:   (p.querySelector('.nameInput')?.value || '').trim() || ('상품' + (i+1)),
        search: (p.querySelector('.searchInput')?.value || '').trim(),
        qty:    Math.max(1, Number(p.querySelector('.qtyInput')?.value) || 1),
        quotes: [...p.querySelectorAll('.quoteRows tr')].map(function(r) {
          return {
            vendor:   (r.querySelector('.vendorInput')?.value   || '').trim(),
            price:    Number(r.querySelector('.priceInput')?.value)   || 0,
            minOrder: Number(r.querySelector('.minInput')?.value)     || 0,
            stock:    r.querySelector('.stockInput')?.value === '' ? ''
                      : (Number(r.querySelector('.stockInput')?.value) || 0),
            enabled:  r.querySelector('.enabledInput')?.checked ?? true,
          };
        }).filter(function(q) { return q.vendor && q.price > 0; }),
      };
    }).filter(function(p) { return p.quotes.length > 0; });

    var coupons = [...document.querySelectorAll('#couponRows tr')].map(function(r) {
      return {
        vendor:   (r.querySelector('.couponVendorInput')?.value  || '').trim(),
        amount:   Number(r.querySelector('.couponAmountInput')?.value) || 0,
        minOrder: Number(r.querySelector('.couponMinInput')?.value)    || 0,
        qty:      Math.max(1, Number(r.querySelector('.couponQtyInput')?.value) || 1),
        enabled:  r.querySelector('.couponEnabledInput')?.checked ?? true,
      };
    }).filter(function(c) { return c.vendor && c.amount > 0; });

    return {
      products: products,
      coupons: coupons,
      savedAt: new Date().toISOString()  // 저장 시각 포함
    };
  }

  // ── 저장 날짜 경고 배너 ─────────────────────────────────────
  function showStalePriceWarning(savedAt) {
    var existing = document.getElementById('__hmpStaleBanner');
    if (existing) existing.remove();

    if (!savedAt) return;
    var savedDate = new Date(savedAt);
    var now = new Date();
    var diffDays = Math.floor((now - savedDate) / (1000 * 60 * 60 * 24));
    if (diffDays < 1) return; // 당일이면 표시 안 함

    var banner = document.createElement('div');
    banner.id = '__hmpStaleBanner';
    var dateStr = savedDate.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' });
    banner.style.cssText = [
      'margin: 12px 0 0',
      'padding: 10px 14px',
      'background: #fffbeb',
      'border: 1px solid #fcd34d',
      'border-radius: 8px',
      'font-size: 12px',
      'color: #92400e',
      'display: flex',
      'align-items: center',
      'justify-content: space-between',
      'gap: 8px'
    ].join(';');
    banner.innerHTML = [
      '<span>⚠️ <strong>' + dateStr + '</strong> 저장된 가격입니다.',
      diffDays + '일 경과 — HMP몰에서 다시 캡처하면 최신 가격으로 업데이트됩니다.</span>',
      '<button onclick="document.getElementById(\'__hmpStaleBanner\').remove()" ',
      'style="background:none;border:none;cursor:pointer;font-size:14px;color:#92400e;',
      'padding:0;height:auto;min-width:0">✕</button>'
    ].join('');

    // sectionTitle 바로 아래에 삽입
    var sectionTitle = document.querySelector('.sectionTitle');
    if (sectionTitle) {
      sectionTitle.insertAdjacentElement('afterend', banner);
    }
  }

  // ── 페이지 로드 시 저장 날짜 확인 ──────────────────────────
  setTimeout(function() {
    try {
      var saved = JSON.parse(localStorage.getItem(HMP_STATE_KEY) || 'null');
      if (saved && saved.savedAt) {
        showStalePriceWarning(saved.savedAt);
      }
    } catch(e) {}
  }, 800); // restoreState() 완료 후 실행

  function autoSave() {
    clearTimeout(__saveTimer);
    __saveTimer = setTimeout(function() {
      try {
        localStorage.setItem(HMP_STATE_KEY, JSON.stringify(readFullState()));
      } catch(e) { console.warn('[HMP] 자동저장 실패:', e); }
    }, 1000); // 마지막 변경 후 1초 뒤 저장
  }

  // 상품 목록 변경 감지 → 자동저장
  document.getElementById('products').addEventListener('input',  autoSave);
  document.getElementById('products').addEventListener('change', autoSave);
  document.getElementById('couponRows').addEventListener('input',  autoSave);
  document.getElementById('couponRows').addEventListener('change', autoSave);

  // 초기화 버튼 → localStorage도 삭제
  var __origClearBtn = document.getElementById('clearBtn');
  if (__origClearBtn) {
    __origClearBtn.addEventListener('click', function() {
      // app.js의 clearBtn 핸들러가 먼저 실행된 뒤 삭제
      setTimeout(function() {
        try { localStorage.removeItem(HMP_STATE_KEY); } catch(e) {}
      }, 100);
    });
  }

  // ── 저장 버튼 (수동 확인용) ─────────────────────────────────
  document.getElementById('saveStateBtn').addEventListener('click', function() {
    try {
      localStorage.setItem(HMP_STATE_KEY, JSON.stringify(readFullState()));
    } catch(e) { console.warn('[HMP] 저장 실패:', e); }
    // 방금 저장했으니 오래된 가격 배너 제거
    document.getElementById('__hmpStaleBanner')?.remove();
    var btn = document.getElementById('saveStateBtn');
    var orig = btn.textContent;
    btn.textContent = '✅ 저장됨';
    btn.style.color = '#16a34a';
    setTimeout(function() { btn.textContent = orig; btn.style.color = ''; }, 1500);
  });

  // ── 상품 체크박스 ───────────────────────────────────────────
  document.getElementById('products').addEventListener('change', function(e) {
    var cb = e.target;
    if (!cb.classList.contains('productEnabledCb')) return;
    var product = cb.closest('.product');
    if (!product) return;
    var enabled = cb.checked;
    product.classList.toggle('disabled', !enabled);
    product.querySelectorAll('.enabledInput').forEach(function(input) {
      input.checked = enabled;
      input.dispatchEvent(new Event('change', { bubbles: true }));
    });
    product.dispatchEvent(new Event('change', { bubbles: true }));
  });
</script>
</body>
</html>
