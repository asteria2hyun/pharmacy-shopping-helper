<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HMP 최저구매 계산기</title>
<link rel="stylesheet" href="./styles.css">
<style>
  /* 확장프로그램 전용 UI 오버라이드 */
  .product .quoteTools,
  .product .pasteBox,
  .product .tableWrap,
  .product .productFields label:first-child /* 검색어 라벨 */ {
    display: none !important;
  }

  /* 상품 카드 - 심플하게 */
  .product {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }

  .productHead {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .productFields {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    flex-wrap: wrap;
  }

  /* 상품명 라벨 - 넓게 */
  .productFields label:nth-child(2) {
    flex: 1;
    min-width: 160px;
  }
  .productFields label:nth-child(2) input {
    width: 100%;
    font-size: 14px;
    font-weight: 600;
  }

  /* 수량 라벨 - 좁게 */
  .productFields .qtyField {
    width: 80px;
    flex-shrink: 0;
  }
  .productFields .qtyField input {
    width: 100%;
    text-align: center;
    font-size: 16px;
    font-weight: 700;
  }

  /* 쿠폰 패널 숨김 - 확장프로그램에서 추가 */
  .couponPanel { display: none !important; }

  /* 헤더 설명 텍스트 변경 */
  .topbar p { display: none; }

  /* 상품 체크박스 */
  .productEnabledCb {
    width: 18px; height: 18px;
    flex-shrink: 0;
    cursor: pointer;
    accent-color: #1a56db;
  }
  .product.disabled {
    opacity: 0.45;
  }
  .product.disabled .nameInput,
  .product.disabled .qtyInput {
    color: #9ca3af;
  }

  /* 업체 미리보기 */
  .productVendorPreview {
    margin-top: 6px;
    padding: 6px 10px;
    background: #f8faff;
    border-radius: 6px;
    border: 1px solid #e0e7ff;
    font-size: 11px;
    color: #374151;
    line-height: 1.6;
  }
  .productVendorPreview .vendor-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .productVendorPreview .vendor-name { color: #1a56db; font-weight: 600; }
  .productVendorPreview .vendor-price { color: #111; }
  .productVendorPreview .vendor-best {
    background: #1a56db;
    color: white;
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 3px;
    margin-left: 3px;
  }

  /* 빈 상태 안내 */
  #products:empty::after {
    content: '확장프로그램에서 HMP몰 상품을 캡처하면 여기에 추가됩니다.';
    display: block;
    padding: 32px 16px;
    text-align: center;
    color: #9ca3af;
    font-size: 13px;
    background: #f9fafb;
    border-radius: 10px;
    border: 1px dashed #e5e7eb;
  }
</style>
</head>
<body>
<header class="topbar">
  <div>
    <h1>HMP 최저구매 계산기</h1>
  </div>
  <button id="addProductBtn" class="primary" style="display:none">상품 추가</button>
</header>

<main class="layout">
  <section class="workspace">

    <!-- 확장프로그램 통신용 (숨김) -->
    <div style="display:none">
      <input id="defaultMinOrder" type="number" value="50000">
      <textarea id="hmpCaptureInput"></textarea>
      <button id="importHmpBtn">가격표 추가</button>
      <button id="pasteClipboardBtn">붙여넣기</button>
      <span id="importHint"></span>
    </div>

    <!-- 쿠폰 (숨김 - 확장프로그램에서 추가) -->
    <div style="display:none">
      <button id="addCouponBtn">쿠폰 추가</button>
      <table>
        <tbody id="couponRows"></tbody>
      </table>
    </div>

    <div class="sectionTitle">
      <h2>📦 주문 상품 목록</h2>
      <div class="titleActions">
        <!-- app.js가 참조하므로 숨김으로 DOM 유지 -->
        <button id="runTestBtn"   class="secondary" style="display:none">테스트</button>
        <button id="loadSampleBtn" class="ghost"   style="display:none">예시</button>
        <button id="clearBtn" class="ghost">초기화</button>
      </div>
    </div>

    <div id="testResult" class="testResult hidden"></div>
    <div id="products" class="products"></div>

  </section>

  <aside class="resultPanel">
    <div class="resultHeader">
      <h2>추천 결과</h2>
      <span id="statusBadge" class="badge">대기</span>
    </div>
    <div class="metricGrid">
      <div><span>추천 총액</span><strong id="bestTotal">-</strong></div>
      <div><span>상품 수</span><strong id="itemCount">0</strong></div>
    </div>
    <h3>구매 목록</h3>
    <div id="bestPlan" class="empty">확장프로그램에서 상품을 캡처하면 결과가 표시됩니다.</div>
    <h3>업체별 합계</h3>
    <div id="vendorSummary" class="empty">아직 계산할 내용이 없습니다.</div>
    <h3>검토할 대안</h3>
    <div id="alternatives" class="empty">추천 조합이 생기면 함께 표시됩니다.</div>
    <div class="suggestionHeader">
      <h3>구매 제안</h3>
      <button id="undoSuggestionBtn" class="ghost smallButton">원상태로</button>
    </div>
    <div id="suggestions" class="empty">쿠폰 조건이나 더 싼 업체가 보이면 제안합니다.</div>
    <h3>HMP 자동담기</h3>
    <div class="autoCartBox">
      <button id="copyAutoCartBtn" class="primary">자동담기 데이터 복사</button>
      <button id="openHmpBtn" class="linkButton compactLink" type="button">HMP 열기</button>
      <div id="autoCartStatus" class="autoCartStatus">확장프로그램에서 자동담기를 시작하세요.</div>
    </div>
  </aside>
</main>

<!-- 상품 템플릿 - 수량만 보이게 -->
<template id="productTemplate">
  <article class="product">
    <div class="productHead">
      <!-- 상품 활성화 체크박스 -->
      <input type="checkbox" class="productEnabledCb" checked title="구매 목록에 포함">
      <div class="productFields">
        <!-- 검색어 (숨김) -->
        <label style="display:none">
          검색어<input class="searchInput" type="text">
        </label>
        <!-- 상품명 -->
        <label>
          <input class="nameInput" type="text" placeholder="상품명">
        </label>
        <!-- 수량 -->
        <label class="qtyField">
          수량<input class="qtyInput" type="number" min="1" step="1" value="1">
        </label>
      </div>
      <button class="removeProduct iconBtn" title="상품 삭제">×</button>
    </div>
    <!-- 업체 가격 도구 (숨김 - 확장프로그램이 채워줌) -->
    <div class="quoteTools" style="display:none">
      <button class="addQuoteBtn secondary">업체 가격 추가</button>
      <button class="pasteToggleBtn ghost">여러 줄 붙여넣기</button>
    </div>
    <div class="pasteBox hidden" style="display:none">
      <textarea class="pasteInput" rows="4"></textarea>
      <button class="pasteApplyBtn secondary">가격표 반영</button>
    </div>
    <div class="tableWrap" style="display:none">
      <table>
        <thead>
          <tr><th>업체명</th><th>단가</th><th>최저주문금액</th><th>재고</th><th>사용</th><th></th></tr>
        </thead>
        <tbody class="quoteRows"></tbody>
      </table>
    </div>
  </article>
</template>

<template id="quoteTemplate">
  <tr>
    <td><input class="vendorInput" type="text" placeholder="업체명"></td>
    <td><input class="priceInput" type="number" min="0" step="1" placeholder="1900"></td>
    <td><input class="minInput" type="number" min="0" step="1000" placeholder="50000"></td>
    <td><input class="stockInput" type="number" min="0" step="1" placeholder="재고"></td>
    <td><input class="enabledInput" type="checkbox" checked></td>
    <td><button class="removeQuote iconBtn" title="가격 삭제">×</button></td>
  </tr>
</template>

<template id="couponTemplate">
  <tr>
    <td><input class="couponVendorInput" type="text" placeholder="예: 대지인팜"></td>
    <td><input class="couponAmountInput" type="number" min="0" step="1000" placeholder="5000"></td>
    <td><input class="couponMinInput" type="number" min="0" step="1000" placeholder="80000"></td>
    <td><input class="couponQtyInput" type="number" min="1" step="1" value="1"></td>
    <td><input class="couponEnabledInput" type="checkbox" checked></td>
    <td><button class="removeCoupon iconBtn" title="쿠폰 삭제">×</button></td>
  </tr>
</template>

<script>
  // 계산기는 매번 새로 캡처해서 쓰므로 이전 상태 복원 안 함
  try { localStorage.removeItem('hmp-helper-state-v1'); } catch(e) {}
</script>
<script src="./app.js"></script>
<script>
  // HMP 열기 - 기존 탭 있으면 이동
  document.getElementById('openHmpBtn').addEventListener('click', () => {
    if (typeof chrome !== 'undefined' && chrome.tabs) {
      chrome.tabs.query({}, tabs => {
        const hmpTab = tabs.find(t => t.url?.includes('hmpmall.co.kr'));
        if (hmpTab) chrome.tabs.update(hmpTab.id, { active: true });
        else chrome.tabs.create({ url: 'https://hmpmall.co.kr' });
      });
    } else {
      window.open('https://hmpmall.co.kr', '_blank');
    }
  });

  // app.js의 초기 addProduct() 호출 막기
  // restoreState()가 false면 빈 상품이 생김 → localStorage를 비워서 restoreState()가 빈 배열 반환하게
  // 대신 addProductBtn을 숨겨서 사용자가 직접 추가 못하게만 함
  // 더 확실한 방법: MutationObserver로 빈 상품 즉시 제거
  const productsEl = document.getElementById('products');
  function isBlankInitialProduct(card) {
    const nameVal = card.querySelector('.nameInput')?.value || '';
    const searchVal = card.querySelector('.searchInput')?.value || '';
    const quotes = [...card.querySelectorAll('.quoteRows tr')].filter(row => {
      const vendor = row.querySelector('.vendorInput')?.value || '';
      const price = row.querySelector('.priceInput')?.value || '';
      return vendor.trim() || price.trim();
    });
    return !nameVal.trim() && !searchVal.trim() && quotes.length === 0;
  }

  function resetEmptyState() {
    document.getElementById('bestTotal').textContent = '-';
    document.getElementById('itemCount').textContent = '0';
    document.getElementById('statusBadge').textContent = '대기';
    document.getElementById('statusBadge').className = 'badge';
    document.getElementById('bestPlan').className = 'empty';
    document.getElementById('bestPlan').textContent = '확장프로그램에서 상품을 캡처하면 결과가 표시됩니다.';
    document.getElementById('vendorSummary').className = 'empty';
    document.getElementById('vendorSummary').textContent = '아직 계산할 내용이 없습니다.';
    document.getElementById('alternatives').className = 'empty';
    document.getElementById('alternatives').textContent = '추천 조합이 생기면 함께 표시됩니다.';
    document.getElementById('suggestions').className = 'empty';
    document.getElementById('suggestions').textContent = '쿠폰 조건이나 더 싼 업체가 보이면 제안합니다.';
    document.getElementById('autoCartStatus').textContent = '확장프로그램에서 자동담기를 시작하세요.';
  }

  const observer = new MutationObserver(() => {
    productsEl.querySelectorAll('.product').forEach(card => {
      if (isBlankInitialProduct(card)) {
        card.remove();
        resetEmptyState();
      }
    });
  });
  observer.observe(productsEl, { childList: true });

  function removeEmptyProducts() {
    productsEl.querySelectorAll('.product').forEach(card => {
      if (isBlankInitialProduct(card)) {
        card.remove();
      }
    });
    if (!productsEl.querySelector('.product')) resetEmptyState();
  }
  removeEmptyProducts();
  setTimeout(removeEmptyProducts, 0);
  setTimeout(removeEmptyProducts, 50);
  setTimeout(removeEmptyProducts, 200);
  setTimeout(removeEmptyProducts, 600);
  setTimeout(removeEmptyProducts, 1200);

  // 상품 체크박스 - 체크 해제 시 해당 상품의 모든 업체 비활성화
  document.getElementById('products').addEventListener('change', e => {
    const cb = e.target;
    if (!cb.classList.contains('productEnabledCb')) return;

    const product = cb.closest('.product');
    if (!product) return;

    const enabled = cb.checked;
    product.classList.toggle('disabled', !enabled);

    // 해당 상품의 모든 업체 enabledInput 체크/언체크
    product.querySelectorAll('.enabledInput').forEach(input => {
      input.checked = enabled;
      input.dispatchEvent(new Event('change', { bubbles: true }));
    });

    // 계산 트리거
    product.dispatchEvent(new Event('change', { bubbles: true }));
  });
</script>
</body>
</html>
