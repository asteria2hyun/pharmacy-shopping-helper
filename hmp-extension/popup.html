<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>약국쇼핑몰 구매도우미</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>약국쇼핑몰 구매도우미</h1>
    <span id="tabState" class="badge">확인 중</span>
  </header>

  <main>
    <section class="panel">
      <label>HMP 상품 가져오기</label>
      <div class="actions single">
        <button id="captureProductBtn" class="primary">현재 선택상품 복사</button>
      </div>
      <p class="status">HMP에서 상품을 검색하고 원하는 상품을 선택한 뒤 누르세요. 계산기 붙여넣기 영역에 바로 넣을 수 있는 데이터가 복사됩니다.</p>
    </section>

    <section class="panel">
      <label for="payloadInput">자동담기 데이터</label>
      <textarea id="payloadInput" rows="10" placeholder="계산기에서 자동담기 데이터 복사 후 여기에 붙여넣기"></textarea>
      <div class="actions">
        <button id="pasteBtn" class="secondary">클립보드 붙여넣기</button>
        <button id="startBtn" class="primary">자동 담기 시작</button>
      </div>
      <div class="actions single">
        <button id="testPanelBtn" class="secondary">HMP 연결 테스트</button>
      </div>
      <p id="status" class="status">HMP몰 탭에서 실행해야 합니다.</p>
    </section>

    <section class="summary hidden" id="summary"></section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
